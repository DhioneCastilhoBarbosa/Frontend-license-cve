name: Frontend Free CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node + cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      # LINT
      - name: Lint
        run: npm run lint

      # TESTES
      - name: Test
        run: npm run test

      # BUILD
      - name: Build
        run: npm run build

      # SCA (dependências)
      - name: NPM Audit (report HIGH)
        run: npm audit --audit-level=high || true

      # SAST (CodeQL)
      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          github-token: ${{ github.token }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          github-token: ${{ github.token }}

      # Secrets scanning
      - name: TruffleHog Scan
        run: |
          git clone https://github.com/trufflesecurity/trufflehog.git
          cd trufflehog
          go build
          ./trufflehog filesystem ../ --fail
