name: Frontend Free CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    outputs:
      install: ${{ steps.collect.outputs.install }}
      lint: ${{ steps.collect.outputs.lint }}
      test: ${{ steps.collect.outputs.test }}
      build: ${{ steps.collect.outputs.build }}
      sca: ${{ steps.collect.outputs.sca }}
      codeql_init: ${{ steps.collect.outputs.codeql_init }}
      codeql_autobuild: ${{ steps.collect.outputs.codeql_autobuild }}
      codeql_analyze: ${{ steps.collect.outputs.codeql_analyze }}
      trufflehog: ${{ steps.collect.outputs.trufflehog }}
    permissions:
      contents: read
      actions: write # upload-artifact precisa de escrita
      pull-requests: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node + cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        id: install
        run: npm ci

      # LINT
      - name: Lint
        id: lint
        run: npm run lint

      # TESTES
      - name: Test
        id: test
        run: npm run test

      # BUILD
      - name: Build
        id: build
        run: npm run build

      - name: Upload artefato (dist)
        if: success() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/
          retention-days: 14

      # SCA (dependências) — não quebra o job; resultado vai para o relatório
      - name: NPM Audit (SCA — HIGH)
        id: audit
        run: |
          if npm audit --audit-level=high; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      # SAST (CodeQL)
      - name: Init CodeQL
        id: codeql-init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          github-token: ${{ github.token }}

      - name: Autobuild
        id: codeql-autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze CodeQL
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          github-token: ${{ github.token }}

      # Secrets scanning (só o repositório do app — não clonar TruffleHog dentro do workspace)
      - name: TruffleHog Scan
        id: trufflehog
        run: |
          set -euo pipefail
          # TruffleHog usa regex por linha; caminhos no CI costumam ser absolutos (/workspace/.git/...),
          # então ^\.git/ não exclui — inclua /\.git/ para ignorar metadados do Git (falsos positivos).
          printf '%s\n' \
            'node_modules' \
            'dist' \
            '/\.git/' \
            '\.git/' \
            '\.trufflehog-exclude' \
            > "${GITHUB_WORKSPACE}/.trufflehog-exclude"
          docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" \
            trufflesecurity/trufflehog:3.93.8 \
            filesystem /workspace --fail --exclude-paths=/workspace/.trufflehog-exclude

      - name: Coletar resultados (para relatório)
        id: collect
        if: always()
        run: |
          label() {
            case "$1" in
              success) echo "Passou" ;;
              failure) echo "Falhou" ;;
              skipped) echo "Ignorado" ;;
              cancelled) echo "Cancelado" ;;
              *) echo "$1" ;;
            esac
          }
          echo "install=$(label '${{ steps.install.outcome }}')" >> "$GITHUB_OUTPUT"
          echo "lint=$(label '${{ steps.lint.outcome }}')" >> "$GITHUB_OUTPUT"
          echo "test=$(label '${{ steps.test.outcome }}')" >> "$GITHUB_OUTPUT"
          echo "build=$(label '${{ steps.build.outcome }}')" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.audit.outcome }}" = "skipped" ]; then
            echo "sca=Ignorado" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.audit.outputs.result }}" = "pass" ]; then
            echo "sca=Passou (sem HIGH+ no npm audit)" >> "$GITHUB_OUTPUT"
          else
            echo "sca=Falhou / vulnerabilidades HIGH+ (ver log do NPM Audit)" >> "$GITHUB_OUTPUT"
          fi
          echo "codeql_init=$(label '${{ steps.codeql-init.outcome }}')" >> "$GITHUB_OUTPUT"
          echo "codeql_autobuild=$(label '${{ steps.codeql-autobuild.outcome }}')" >> "$GITHUB_OUTPUT"
          echo "codeql_analyze=$(label '${{ steps.codeql.outcome }}')" >> "$GITHUB_OUTPUT"
          echo "trufflehog=$(label '${{ steps.trufflehog.outcome }}')" >> "$GITHUB_OUTPUT"

  # Sempre executa ao fim (mesmo se o job frontend falhar) — relatório na aba Summary do run
  ci-report:
    name: Relatório do workflow
    runs-on: ubuntu-latest
    needs: frontend
    if: always()
    permissions:
      contents: read
    steps:
      - name: Resumo (GitHub Step Summary)
        run: |
          {
            echo "## Relatório — Frontend Free CI"
            echo ""
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Workflow | \`${{ github.workflow }}\` |"
            echo "| Evento | \`${{ github.event_name }}\` |"
            echo "| Branch/ref | \`${{ github.ref_name }}\` (\`${{ github.ref }}\`) |"
            echo "| SHA | \`${{ github.sha }}\` |"
            echo "| Ator | @${{ github.actor }} |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| **Job \`frontend\` (geral)** | **${{ needs.frontend.result }}** |"
            echo ""
            echo "### Qualidade e build"
            echo ""
            echo "| Etapa | Resultado |"
            echo "|-------|-----------|"
            echo "| Instalação (\`npm ci\`) | ${{ needs.frontend.outputs.install }} |"
            echo "| Lint | ${{ needs.frontend.outputs.lint }} |"
            echo "| Testes | ${{ needs.frontend.outputs.test }} |"
            echo "| Build | ${{ needs.frontend.outputs.build }} |"
            echo ""
            echo "### Segurança"
            echo ""
            echo "| Etapa | Resultado |"
            echo "|-------|-----------|"
            echo "| **SCA** — \`npm audit\` (nível HIGH) | ${{ needs.frontend.outputs.sca }} |"
            echo "| **SAST** — CodeQL init | ${{ needs.frontend.outputs.codeql_init }} |"
            echo "| **SAST** — CodeQL autobuild | ${{ needs.frontend.outputs.codeql_autobuild }} |"
            echo "| **SAST** — CodeQL analyze / upload | ${{ needs.frontend.outputs.codeql_analyze }} |"
            echo "| **Secrets** — TruffleHog | ${{ needs.frontend.outputs.trufflehog }} |"
            echo ""
            echo "### Onde ver mais detalhes"
            echo "- **Logs por step:** job **frontend**."
            echo "- **CodeQL (alertas):** **Security** → *Code scanning alerts*."
            echo "- **Build:** artefato \`dist-${{ github.run_number }}\` no job **frontend** (se o build passou)."
            echo ""
            echo "_Gerado automaticamente ao fim do workflow._"
          } >> "$GITHUB_STEP_SUMMARY"
