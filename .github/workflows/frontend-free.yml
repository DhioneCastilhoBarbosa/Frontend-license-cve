name: Frontend Free CI

on:
  push:
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node + cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      # LINT
      - name: Lint
        run: npm run lint

      # TESTES
      - name: Test
        run: npm run test

      # BUILD
      - name: Build
        run: npm run build

      # SCA (dependências)
      - name: NPM Audit (fail HIGH)
        run: npm audit --audit-level=high

      # SAST (CodeQL)
      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v3

      # Secrets scanning
      - name: TruffleHog Scan
        run: |
          git clone https://github.com/trufflesecurity/trufflehog.git
          cd trufflehog
          go build
          ./trufflehog filesystem ../ --fail
